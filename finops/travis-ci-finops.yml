specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Travis CI
providerId: travis-ci
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- DevOps
- CI/CD
- Build
- Open Source
- Hosted
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps profile for Travis CI. Billing is plan-based with build
  credit consumption tracked against the plan's monthly/annual budget;
  Unlimited plans bill a flat seat fee. Server (on-prem) plans bill a flat
  monthly per-instance fee. The customer's own infrastructure cost applies
  only to Server deployments.
notes: >-
  Build credits are the unit of consumption inside Travis. Premium VM jobs
  consume credits at higher rates than Linux jobs; macOS / Windows / GPU
  multipliers vary. The Travis dashboard exposes a per-organization usage page
  for chargeback.
sources:
- https://www.travis-ci.com/pricing/
- https://docs.travis-ci.com/user/billing-overview/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Travis CI
serviceCategory: DevOps / CI/CD
billingModel:
  pricingCategory: Subscription + Usage
  billingFrequency: Monthly / Annual
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Travis CI
  ServiceCategory: DevOps
  ProviderName: Travis CI
  PublisherName: Travis CI
  InvoiceIssuerName: Travis CI
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingUnit: build-credit
meters:
- name: build_credits
  description: Linux/macOS/Windows/GPU build credits consumed by jobs.
  unit: credit
  aggregation: sum
  dimensions:
  - organization
  - repository
  - os
- name: concurrent_jobs
  description: Peak concurrent jobs.
  unit: jobs
  aggregation: max
  dimensions:
  - organization
- name: subscription_seat
  description: Monthly/annual subscription fee per plan.
  unit: month
  aggregation: sum
  dimensions:
  - organization
  - plan
- name: server_instance_month
  description: On-prem Travis CI Server license fee per instance.
  unit: instance-month
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Use the Travis CI organization Usage page; reconcile against monthly invoice.
- name: Allocation
  description: Allocate by organization, then by repository; map to FOCUS ResourceTag.
- name: Optimization
  description: Cache aggressively; gate slow tests; use Linux instead of premium VMs where viable; right-size plan to actual concurrency.
- name: Accountability
  description: Assign organization owners; alert on credit burn-down toward plan ceiling.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
