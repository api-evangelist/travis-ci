specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Travis CI
providerId: travis-ci
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- DevOps
- CI/CD
- Build
- Open Source
- Hosted
- Plans
- Pricing
description: >-
  Travis CI sells three primary plans — Usage Based, Unlimited and Server
  (Enterprise) — with monthly or annual billing. Open-source projects can run
  for free via the OSS plan with a credit allotment. Volume discounts apply for
  20+ user teams; custom enterprise pricing also available.
notes: >-
  Numeric prices below reflect the public Travis CI pricing page as of
  2026-05-08. Annual prices include the 8% advertised discount.
sources:
- https://www.travis-ci.com/pricing/
- https://docs.travis-ci.com/user/billing-overview/
plans:
- id: travis-oss
  name: Open Source
  type: free
  description: Free CI for open-source repositories with a per-organization credit allotment.
  entries:
  - label: Open source
    name: oss
    type: flat
    metric: license
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
- id: travis-usage-monthly
  name: Usage Based — Monthly
  type: subscription
  description: $15/mo. 35,000 Linux build credits/month, 80 concurrent jobs, premium VM access.
  entries:
  - label: Plan price
    name: monthly_price
    type: flat
    metric: month
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: 15
    currency: USD
    userMultiplied: false
  - label: Linux build credits
    name: build_credits
    type: tier
    metric: credits/month
    limit: 35000
    timeFrame: month
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
